name: Deploy Weather Dashboard to Pages

on:
  push:
    branches: ["main"] # Triggers deployment whenever you push code to the main branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Upload Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the root directory containing your HTML, CSS, and JS

      - name: Deploy Live Site to Pages
        id: deployment
        uses: actions/deploy-pages@v4

